<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page Not Found — The Perpetualite</title>
<link rel="icon" type="image/png" href="tp.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Brand + Search -->
  <header>
    <div class="nav" role="navigation" aria-label="Primary navigation">
      <div class="brand">
        <div class="logo"><img id="icon" src="tp.png" alt="Logo"></div>
        <div>
          <div class="brand-name">The Perpetualite</div>
          <div class="brand-subtitle">Student publication • Stories from campus</div>
        </div>
        <div class="search">
          <input placeholder="Search articles..." aria-label="Search articles" />
        </div>
      </div>
    </div>

    <!-- Marquee -->
    <div class="marquee-container">
      <div class="marquee">
        News • Features • Opinion • Sports • Culture • Science & Tech • Student Life • Multimedia
      </div>
    </div>
  </header>

  <!-- 404 Message -->
  <main class="error-content">
    <h1>404</h1>
    <h2>Oops! Page not found.</h2>
    <p>The page you are looking for does not exist or has been moved.</p>
    <a href="index.html" class="btn">Go Home</a>
  </main>

</div>

</body>
</html>
